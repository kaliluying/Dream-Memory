[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "deepagent-memory"
version = "0.1.0"
description = "Local CLI for importing, reviewing, and injecting durable agent memory."
readme = "README.md"
requires-python = ">=3.11,<4.0"
authors = [{ name = "Gemaolin" }]
dependencies = [
    "deepagents>=0.6.12",
    "fastapi>=0.139.0",
    "httpx2>=2.5.0",
    "uvicorn>=0.50.0",
]

[dependency-groups]
dev = []

[project.scripts]
deepagent-advice = "deepagent_project_advice.cli:main"
deepagent-code = "deepagent_project_advice.interactive:main"
deepagent-memory = "deepagent_project_advice.memory_cli:main"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
